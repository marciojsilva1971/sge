<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGE - Teste de Conexão</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
        h2 {
            color: #0d9488;
            margin-top: 0;
            font-size: 24px;
        }
        p {
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.6;
        }
        .status-box {
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 16px;
            margin: 20px 0;
            font-family: monospace;
            text-align: left;
            font-size: 13px;
        }
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #10b981;
            margin-right: 8px;
            vertical-align: middle;
        }
        .btn {
            background: linear-gradient(135deg, #4f46e5, #0d9488);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
            filter: brightness(1.1);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>SGE - Teste de Conexão</h2>
        <p>Este arquivo serve para validar se o servidor web Apache está respondendo corretamente aos acessos externos e locais.</p>
        
        <div class="status-box">
            <div><span class="status-indicator" id="indicator"></span>Status: <strong id="status-text">Online (Apache)</strong></div>
            <div style="margin-top: 10px;">Data/Hora local: <span id="time">-</span></div>
            <div style="margin-top: 6px;">Protocolo: <span id="protocol">-</span></div>
            <div style="margin-top: 6px;">User Agent: <span id="ua" style="font-size: 10px; word-break: break-all;">-</span></div>
        </div>

        <button class="btn" onclick="testPing()">Testar Resposta novamente</button>
        
        <div class="footer">
            Sistema de Gestão Eleitoral &bull; Testes de Infraestrutura
        </div>
    </div>

    <script>
        function updateStatus() {
            document.getElementById('time').innerText = new Date().toLocaleString('pt-BR');
            document.getElementById('protocol').innerText = window.location.protocol;
            document.getElementById('ua').innerText = navigator.userAgent;
        }

        function testPing() {
            const indicator = document.getElementById('indicator');
            const statusText = document.getElementById('status-text');
            
            indicator.style.backgroundColor = '#fbbf24'; // Amarelo (testando)
            statusText.innerText = 'Testando resposta...';
            
            // Faz um fetch para a mesma página apenas para comprovar a ida e volta de pacotes HTTP
            fetch(window.location.href, { cache: 'no-store' })
                .then(response => {
                    if(response.ok) {
                        indicator.style.backgroundColor = '#10b981'; // Verde (sucesso)
                        statusText.innerText = 'Conectado (HTTP ' + response.status + ')';
                    } else {
                        indicator.style.backgroundColor = '#ef4444'; // Vermelho (erro)
                        statusText.innerText = 'Erro de Servidor (HTTP ' + response.status + ')';
                    }
                    updateStatus();
                })
                .catch(err => {
                    indicator.style.backgroundColor = '#ef4444'; // Vermelho (erro de conexão)
                    statusText.innerText = 'Erro de Conectividade / Offline';
                    updateStatus();
                });
        }

        // Inicializa dados na página
        updateStatus();
    </script>
</body>
</html>
