name: Deploy Automatico SGE DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Executar Deploy via SSH na VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /var/www/sge
            cd /var/www/sge
            git fetch origin main
            git reset --hard origin/main
            chown -R www-data:www-data /var/www/sge
            chmod -R 755 /var/www/sge
            chmod -R 775 /var/www/sge/storage /var/www/sge/public/uploads
