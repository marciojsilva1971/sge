name: Deploy SGE to DigitalOcean VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH to DigitalOcean VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/sge
            git pull origin main
            chmod -R 755 /var/www/sge
            chmod -R 775 /var/www/sge/storage /var/www/sge/public/uploads
            chown -R www-data:www-data /var/www/sge
